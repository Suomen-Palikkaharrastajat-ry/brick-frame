name: Scheduled update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Four times per day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-scheduled
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LDRAW_SYNC_URL: https://library.ldraw.org/library/updates/complete.zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prepare vendor links
        run: make vendor

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v16
        with:
          name: palikkaharrastajat
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: devenv

      - name: Install devenv
        run: nix profile install "github:cachix/devenv/v2.0.6"

      - name: Restore Elm cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.elm
            elm-app/elm-stuff
          key: elm-${{ runner.os }}-${{ hashFiles('elm-app/elm.json') }}
          restore-keys: elm-${{ runner.os }}-

      - name: Compute Pages base path
        id: pages-base
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "vite_public_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_public_base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore LDraw library cache
        id: ldraw-cache
        uses: actions/cache@v4
        with:
          path: elm-app/public/ldraw
          key: ldraw-${{ runner.os }}-${{ env.LDRAW_SYNC_URL }}-${{ hashFiles('scripts/sync-ldraw.sh', 'Makefile', 'ldraw-sync.lock.json') }}

      - name: Sync LDraw library (cache miss)
        if: steps.ldraw-cache.outputs.cache-hit != 'true'
        run: devenv shell --profile ci -- make sync-ldraw

      - name: Build
        env:
          VITE_PUBLIC_BASE: ${{ steps.pages-base.outputs.vite_public_base }}
        run: devenv shell --profile ci -- make dist-ci

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

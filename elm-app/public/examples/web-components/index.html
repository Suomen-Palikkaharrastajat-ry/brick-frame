<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palikkakehys Web Components</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f9fafb;
      color: #05131d;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(5, 19, 29, 0.08);
    }

    bricks-viewer,
    bricks-simulator {
      display: block;
      width: 100%;
      height: 480px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>Palikkakehys Web Components Demo</h1>
  <p>Plain HTML + built bundle only.</p>

  <div class="grid">
    <section class="card">
      <h2>Viewer</h2>
      <bricks-viewer src="../gears.ldr"></bricks-viewer>
    </section>

    <section class="card">
      <h2>Simulator</h2>
      <bricks-simulator src="../gears.ldr"></bricks-simulator>
    </section>
  </div>

  <script src="./bricks-web-components.iife.js"></script>
</body>
</html>

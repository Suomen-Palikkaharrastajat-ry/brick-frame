  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #d9e0e7;
      --text: #0d2233;
      --muted: #4a6175;
      --accent: #0f6cab;
      --accent-soft: #e8f2fb;
      --shadow: 0 18px 36px rgba(7, 27, 44, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(180deg, #f7fafc 0%, #eef3f8 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .intro,
    .playground {
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro {
      padding: 16px;
    }

    .intro h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .intro p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .playground-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #fbfdff;
    }

    .playground-header h2 {
      margin: 0;
      font-size: 1rem;
    }

    .playground-header span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .playground-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 0;
      min-height: 560px;
    }

    .preview-pane,
    .editor-pane {
      padding: 12px;
    }

    .preview-pane {
      border-right: 1px solid var(--border);
      background: #f8fbfe;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .preview-label,
    .editor-label {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      min-height: 500px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab-btn,
    .copy-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 6px 10px;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--accent-soft);
      border-color: #bfd7ec;
      color: #0a4874;
      font-weight: 600;
    }

    .editor-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .copy-status {
      color: var(--muted);
      font-size: 0.8rem;
      min-height: 1em;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.79rem;
      color: var(--muted);
    }

    .field-help {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .file-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .file-row input[type="file"] {
      flex: 1 1 260px;
      min-width: 220px;
    }

    .ghost-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 6px 10px;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .field input,
    .field select,
    textarea {
      border: 1px solid var(--border);
      padding: 8px;
      font: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: #fff;
      width: 100%;
    }

    textarea {
      min-height: 420px;
      resize: vertical;
      font-family: "IBM Plex Mono", "Consolas", monospace;
      line-height: 1.4;
      white-space: pre;
    }

    @media (max-width: 1080px) {
      .playground-grid {
        grid-template-columns: 1fr;
      }

      .preview-pane {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .preview-frame {
        min-height: 460px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

</head>
<body>
  <main>
    <section class="intro">
      <h1>Palikkakehys – Suomen Palikkaharrastajat ry</h1>
    </section>

    <section class="playground" data-playground="viewer"></section>
  </main>

  <script>
    const BUNDLE_PARAM = new URLSearchParams(window.location.search).get('bundle')
    const DEFAULT_BUNDLE_URL = (BUNDLE_PARAM && String(BUNDLE_PARAM).trim())
      ? String(BUNDLE_PARAM).trim()
      : 'https://kehys.palikkaharrastajat.fi/bricks-viewer.iife.js'
    const DEFAULT_ELEMENT_STATE = {
      src: '../examples/smile.ldr',
      controls: false,
      cameraAzimuth: '',
      cameraElevation: '',
      cameraDistance: '',
      cameraTargetX: '',
      cameraTargetY: '',
      cameraTargetZ: '',
      motorIndex: '',
      rpm: '',
    }

    function usesModuleScript(bundleUrl) {
      const normalized = String(bundleUrl ?? '').trim().toLowerCase()
      return normalized.endsWith('.mjs')
        || normalized.includes('web-components/index.js')
        || normalized.includes('bricks-viewer.esm.js')
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
    }

    function buildSnippet(state) {
      const tagName = 'bricks-viewer'
      const attrs = []
      if (state.controls) {
        attrs.push('controls')
      }
      const optional = {
        src: state.src,
        'camera-azimuth': state.cameraAzimuth,
        'camera-elevation': state.cameraElevation,
        'camera-distance': state.cameraDistance,
        'camera-target-x': state.cameraTargetX,
        'camera-target-y': state.cameraTargetY,
        'camera-target-z': state.cameraTargetZ,
        'motor-index': state.motorIndex,
        rpm: state.rpm,
      }

      Object.entries(optional).forEach(([key, value]) => {
        const normalized = String(value ?? '').trim()
        const stateKey = key === 'camera-azimuth'
          ? 'cameraAzimuth'
          : key === 'camera-elevation'
            ? 'cameraElevation'
            : key === 'camera-distance'
              ? 'cameraDistance'
              : key === 'camera-target-x'
                ? 'cameraTargetX'
                : key === 'camera-target-y'
                  ? 'cameraTargetY'
                  : key === 'camera-target-z'
                    ? 'cameraTargetZ'
                    : key === 'motor-index'
                      ? 'motorIndex'
              : key

        const defaultValue = String(DEFAULT_ELEMENT_STATE[stateKey] ?? '').trim()
        if (normalized && (key === 'src' || normalized !== defaultValue)) {
          attrs.push(`${key}="${escapeHtml(normalized)}"`)
        }
      })

      const elementLine = attrs.length > 0
        ? `<${tagName} ${attrs.join(' ')}></${tagName}>`
        : `<${tagName}></${tagName}>`

      const scriptLine = usesModuleScript(state.bundleUrl)
        ? `<script type="module" src="${escapeHtml(state.bundleUrl)}"><\/script>`
        : `<script src="${escapeHtml(state.bundleUrl)}"><\/script>`

      return `${scriptLine}\n\n${elementLine}`
    }

    function buildPreviewDocument(snippet, playgroundId) {
      const previewBaseHref = `${window.location.origin}/`
      return `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="${previewBaseHref}" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f7fbff;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    body {
      padding: 14px;
      box-sizing: border-box;
    }
    bricks-viewer {
      display: block;
      width: 100%;
      height: min(74vh, 520px);
      border: 1px solid #d9e0e7;
      overflow: hidden;
      background: #fff;
    }
  </style>
</head>
<body>
${snippet}
<script>
  const PLAYGROUND_ID = ${JSON.stringify(playgroundId)}
  document.addEventListener('camera-changed', (event) => {
    const detail = event?.detail ?? {}
    window.parent.postMessage(
      {
        type: 'camera-changed',
        playgroundId: PLAYGROUND_ID,
        azimuthDeg: detail.azimuthDeg,
        elevationDeg: detail.elevationDeg,
        distance: detail.distance,
        targetX: detail.targetX,
        targetY: detail.targetY,
        targetZ: detail.targetZ,
      },
      '*',
    )
  })
<\/script>
</body>
</html>`
    }

    function parseSnippet(snippet) {
      const parser = new DOMParser()
      const doc = parser.parseFromString(`<body>${snippet}</body>`, 'text/html')
      const element = doc.querySelector('bricks-viewer')
      const script = doc.querySelector('script[src]')
      if (!element) {
        return null
      }

      const get = (name) => element.getAttribute(name) ?? ''

      return {
        bundleUrl: script?.getAttribute('src') ?? DEFAULT_BUNDLE_URL,
        src: get('src'),
        controls: element.hasAttribute('controls'),
        cameraAzimuth: get('camera-azimuth'),
        cameraElevation: get('camera-elevation'),
        cameraDistance: get('camera-distance'),
        cameraTargetX: get('camera-target-x'),
        cameraTargetY: get('camera-target-y'),
        cameraTargetZ: get('camera-target-z'),
        motorIndex: get('motor-index'),
        rpm: get('rpm'),
      }
    }

    function createPlayground() {
      const container = document.querySelector('[data-playground="viewer"]')
      const mode = 'viewer'

      const state = {
        bundleUrl: DEFAULT_BUNDLE_URL,
        ...DEFAULT_ELEMENT_STATE,
      }

      container.innerHTML = `
        <div class="playground-grid">
          <div class="preview-pane">
            <p class="preview-label">Esikatselu</p>
            <iframe class="preview-frame" title="Esikatselu"></iframe>
          </div>
          <div class="editor-pane">
            <div class="editor-controls">
              <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="form">Lomake</button>
                <button type="button" class="tab-btn" data-tab="raw">HTML-koodi</button>
              </div>
              <button type="button" class="copy-btn">Kopioi koodi</button>
            </div>
            <p class="copy-status" aria-live="polite"></p>
            <section class="panel panel-form active">
              <p class="editor-label">Asetukset</p>
              <div class="form-grid">
                <div class="field full">
                  <label>Bundle-URL</label>
                  <input data-key="bundleUrl" type="url" />
                </div>
                <div class="field full">
                  <label>Mallin lähde</label>
                  <input data-key="src" type="url" placeholder="oletusmalli kun tyhjä" />
                </div>
                <div class="field full">
                  <label>Paikallinen mallitiedosto (.ldr, .mpd, .dat, .io)</label>
                  <div class="file-row">
                    <input data-local-file-input type="file" accept=".ldr,.mpd,.dat,.io" />
                    <button type="button" class="ghost-btn" data-clear-local-file>Poista paikallinen tiedosto</button>
                  </div>
                  <p class="field-help" data-local-file-status>Ei paikallista tiedostoa valittu. Valittuna paikallista tiedostoa käytetään vain tässä esikatselmassa.</p>
                </div>
                <div class="field">
                  <label>Näytä ohjaimet</label>
                  <input data-key="controls" type="checkbox" />
                </div>
                <div class="field">
                  <label>Kameran atsimuutti (astetta)</label>
                  <input data-key="cameraAzimuth" type="number" step="1" placeholder="valinnainen" />
                </div>
                <div class="field">
                  <label>Kameran korkeus (astetta)</label>
                  <input data-key="cameraElevation" type="number" step="1" placeholder="valinnainen" />
                </div>
                <div class="field">
                  <label>Kameran etäisyys</label>
                  <input data-key="cameraDistance" type="number" step="1" min="1" placeholder="valinnainen" />
                </div>
                <div class="field">
                  <label>Kameran kohde X</label>
                  <input data-key="cameraTargetX" type="number" step="1" placeholder="valinnainen" />
                </div>
                <div class="field">
                  <label>Kameran kohde Y</label>
                  <input data-key="cameraTargetY" type="number" step="1" placeholder="valinnainen" />
                </div>
                <div class="field">
                  <label>Kameran kohde Z</label>
                  <input data-key="cameraTargetZ" type="number" step="1" placeholder="valinnainen" />
                </div>
              </div>
            </section>
            <section class="panel panel-raw">
              <p class="editor-label">Generoitu HTML-koodi</p>
              <textarea spellcheck="false"></textarea>
            </section>
          </div>
        </div>
      `

      const iframe = container.querySelector('.preview-frame')
      const textArea = container.querySelector('textarea')
      const status = container.querySelector('.copy-status')
      const inputs = container.querySelectorAll('[data-key]')
      const localFileInput = container.querySelector('[data-local-file-input]')
      const clearLocalFileButton = container.querySelector('[data-clear-local-file]')
      const localFileStatus = container.querySelector('[data-local-file-status]')
      let previewObjectUrl = null
      let localModelUrl = null
      let localFileName = ''

      function setPreviewHtml(html, preferBlobUrl) {
        if (previewObjectUrl) {
          URL.revokeObjectURL(previewObjectUrl)
          previewObjectUrl = null
        }

        if (preferBlobUrl) {
          const blob = new Blob([html], { type: 'text/html' })
          previewObjectUrl = URL.createObjectURL(blob)
          iframe.src = previewObjectUrl
        } else {
          iframe.srcdoc = html
        }
      }

      function updateLocalFileStatus() {
        if (!localFileStatus) {
          return
        }

        localFileStatus.textContent = localModelUrl
          ? `Käytetään paikallista tiedostoa: ${localFileName}. Tätä tiedostoa ei sisällytetä generoituun HTML-koodiin.`
          : 'Ei paikallista tiedostoa valittu. Valittuna paikallista tiedostoa käytetään vain tässä esikatselmassa.'
      }

      function clearLocalModel() {
        if (localModelUrl) {
          URL.revokeObjectURL(localModelUrl)
        }
        localModelUrl = null
        localFileName = ''
        updateLocalFileStatus()
      }

      function previewSnippetFromState() {
        if (!localModelUrl) {
          return buildSnippet(state)
        }

        return buildSnippet({
          ...state,
          src: localModelUrl,
        })
      }

      function rawSnippetFromState() {
        if (!localFileName) {
          return buildSnippet(state)
        }

        return buildSnippet({
          ...state,
          src: localFileName,
        })
      }

      function syncFormFromState() {
        inputs.forEach((input) => {
          const key = input.dataset.key
          if (input.type === 'checkbox') {
            input.checked = Boolean(state[key])
          } else {
            input.value = state[key] ?? ''
          }
        })
      }

      function renderFromState() {
        textArea.value = rawSnippetFromState()
        const previewSnippet = previewSnippetFromState()
        setPreviewHtml(buildPreviewDocument(previewSnippet, mode), usesModuleScript(state.bundleUrl))
      }

      function renderFromRaw() {
        const raw = String(textArea.value ?? '')
        const hasModuleScript = /<script[^>]*type=["']module["']/i.test(raw)
        setPreviewHtml(buildPreviewDocument(raw, mode), hasModuleScript)
        const parsed = parseSnippet(raw)
        if (parsed) {
          Object.assign(state, parsed)
          syncFormFromState()
        }
      }

      window.addEventListener('message', (event) => {
        if (event.source !== iframe.contentWindow) {
          return
        }
        const payload = event.data
        if (!payload || payload.type !== 'camera-changed' || payload.playgroundId !== mode) {
          return
        }

        const toStringOrEmpty = (value) =>
          Number.isFinite(Number(value)) ? String(Math.round(Number(value) * 10) / 10) : ''

        state.cameraAzimuth = toStringOrEmpty(payload.azimuthDeg)
        state.cameraElevation = toStringOrEmpty(payload.elevationDeg)
        state.cameraDistance = toStringOrEmpty(payload.distance)
        state.cameraTargetX = toStringOrEmpty(payload.targetX)
        state.cameraTargetY = toStringOrEmpty(payload.targetY)
        state.cameraTargetZ = toStringOrEmpty(payload.targetZ)
        syncFormFromState()
        textArea.value = rawSnippetFromState()
      })

      inputs.forEach((input) => {
        input.addEventListener('input', () => {
          const key = input.dataset.key
          state[key] = input.type === 'checkbox' ? input.checked : input.value
          renderFromState()
        })
        input.addEventListener('change', () => {
          const key = input.dataset.key
          state[key] = input.type === 'checkbox' ? input.checked : input.value
          renderFromState()
        })
      })

      textArea.addEventListener('input', renderFromRaw)

      container.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('.tab-btn').forEach((candidate) => {
            candidate.classList.toggle('active', candidate === btn)
          })
          const selected = btn.dataset.tab
          container.querySelector('.panel-form').classList.toggle('active', selected === 'form')
          container.querySelector('.panel-raw').classList.toggle('active', selected === 'raw')
        })
      })

      container.querySelector('.copy-btn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(textArea.value)
          status.textContent = 'Koodi kopioitu.'
        } catch {
          status.textContent = 'Leikepöytä ei ole saatavilla. Valitse ja kopioi manuaalisesti.'
        }
        setTimeout(() => {
          status.textContent = ''
        }, 1600)
      })

      localFileInput.addEventListener('change', () => {
        const nextFile = localFileInput.files && localFileInput.files.length > 0
          ? localFileInput.files[0]
          : null

        clearLocalModel()

        if (nextFile) {
          localFileName = nextFile.name || 'local-file'
          localModelUrl = URL.createObjectURL(nextFile)
        }

        updateLocalFileStatus()
        renderFromState()
      })

      clearLocalFileButton.addEventListener('click', () => {
        localFileInput.value = ''
        clearLocalModel()
        renderFromState()
      })

      window.addEventListener('beforeunload', () => {
        clearLocalModel()
      })

      updateLocalFileStatus()
      syncFormFromState()
      renderFromState()
    }

    createPlayground()
  </script>
</body>
</html>
